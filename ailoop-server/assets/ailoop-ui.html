<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ailoop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link id="favicon" rel="icon" href="data:," />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'JetBrains Mono', monospace;
  --bg: #0a0a0f;
  --bg1: #0f0f17;
  --bg2: #14141f;
  --bg3: #1a1a28;
  --border: #252535;
  --border2: #2e2e46;
  --text: #c8c8e0;
  --text-dim: #5a5a7a;
  --text-bright: #e8e8f8;
  --accent: #7c3aed;
  --accent-bright: #9d5cf5;
  --accent-dim: #3d1c7a;
  --ask: #2563eb;
  --ask-dim: #1e3a8a;
  --auth-yes: #16a34a;
  --auth-no: #dc2626;
  --say: #7c3aed;
  --forward: #0891b2;
  --forward-dim: #0c4a6e;
  --warn: #d97706;
  --urgent: #ef4444;
  --scrollbar: #1e1e30;
  --radius: 3px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; overflow: hidden; }
#root { height: 100%; display: flex; flex-direction: column; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  height: 44px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-logo {
  font-size: 14px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--accent-bright);
  display: flex; align-items: center; gap: 8px;
}
.topbar-logo svg { width: 16px; height: 16px; }
.topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.conn-form { display: flex; align-items: center; gap: 8px; flex: 1; }
.conn-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 12px;
  padding: 5px 10px;
  width: 260px;
  outline: none;
  transition: border-color 0.15s;
}
.conn-input:focus { border-color: var(--accent); }
.conn-input::placeholder { color: var(--text-dim); }
.btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid transparent;
  border-radius: var(--radius);
  padding: 5px 14px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-connect { background: var(--accent); color: #fff; border-color: var(--accent-bright); }
.btn-connect:hover { background: var(--accent-bright); }
.btn-disconnect { background: transparent; color: var(--text-dim); border-color: var(--border2); }
.btn-disconnect:hover { color: var(--text); border-color: var(--text-dim); }

.status-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border2);
  transition: background 0.3s;
}
.status-dot.connected { background: var(--auth-yes); box-shadow: 0 0 6px var(--auth-yes); }
.status-dot.connecting { background: var(--warn); animation: pulse 1s infinite; }
.status-dot.error { background: var(--urgent); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

.sidebar {
  width: 180px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg1);
  overflow: hidden;
}
.sidebar-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  padding: 0 14px 6px;
  text-transform: uppercase;
}
.channel-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.1s;
  gap: 6px;
}
.channel-item:hover { background: var(--bg2); }
.channel-item.active { background: var(--accent-dim); }
.channel-item.active .ch-name { color: var(--accent-bright); }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
.ch-dot.active { background: var(--accent-bright); }
.ch-name { font-size: 12px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ch-count {
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 5px;
  min-width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.stats-grid { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; }
.stat-label { font-size: 11px; color: var(--text-dim); }
.stat-val { font-size: 11px; font-weight: 600; }
.stat-val.ask { color: #60a5fa; }
.stat-val.auth { color: #4ade80; }
.stat-val.say { color: var(--accent-bright); }
.stat-val.forward { color: #38bdf8; }

.feed-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.feed-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg1);
}
.filter-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  padding: 3px 10px;
  cursor: pointer;
  transition: all 0.12s;
}
.filter-btn:hover { color: var(--text); border-color: var(--border2); }
.filter-btn.active-ask { background: var(--ask-dim); color: #93c5fd; border-color: var(--ask); }
.filter-btn.active-authorize { background: #14532d; color: #86efac; border-color: var(--auth-yes); }
.filter-btn.active-say { background: var(--accent-dim); color: var(--accent-bright); border-color: var(--accent); }
.filter-btn.active-events { background: var(--forward-dim); color: #38bdf8; border-color: var(--forward); }
.filter-btn.active-all { background: var(--bg3); color: var(--text-bright); border-color: var(--border2); }
.filter-btn.active-pending { background: #450a0a; color: var(--urgent); border-color: var(--urgent); }
.filter-btn.active-autoopen { background: var(--accent-dim); color: var(--accent-bright); border-color: var(--accent); }
.filter-btn.active-beep  { background: var(--accent-dim); color: var(--accent-bright); border-color: var(--accent); }
.filter-btn.active-flash { background: var(--accent-dim); color: var(--accent-bright); border-color: var(--accent); }
.feed-toolbar-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.btn-clear { font-family: var(--font); font-size: 11px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 3px 8px; }
.btn-clear:hover { color: var(--text); }
.scroll-btn { font-family: var(--font); font-size: 11px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-dim); cursor: pointer; padding: 3px 8px; }
.scroll-btn:hover { color: var(--text); border-color: var(--border2); }

.notif-banner {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border2);
  font-size: 11px;
  color: var(--text);
  flex-shrink: 0;
}
.notif-banner-text { flex: 1; }

.feed { flex: 1; overflow-y: auto; padding: 10px 0; }
.feed-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 10px; color: var(--text-dim);
}
.feed-empty-icon { font-size: 28px; opacity: 0.3; }
.feed-empty-text { font-size: 12px; opacity: 0.5; text-align: center; line-height: 1.8; white-space: pre-line; }

.event-card {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  position: relative;
  animation: slideIn 0.18s ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.event-card:hover { background: var(--bg2); }
.event-card:last-child { border-bottom: none; }

.event-stripe { width: 3px; flex-shrink: 0; }
.stripe-ask { background: #3b82f6; }
.stripe-authorize { background: var(--auth-yes); }
.stripe-say { background: var(--accent); }
.stripe-events { background: var(--forward); }
.stripe-error { background: var(--urgent); }
.stripe-unknown { background: var(--text-dim); }
.stripe-navigate { background: #d97706; }

.event-body { flex: 1; padding: 10px 14px; min-width: 0; }
.event-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.event-type {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 1px 7px; border-radius: 2px;
  text-transform: uppercase;
}
.type-ask { background: var(--ask-dim); color: #93c5fd; border: 1px solid var(--ask); }
.type-authorize { background: #14532d; color: #86efac; border: 1px solid #166534; }
.type-say { background: var(--accent-dim); color: #c084fc; border: 1px solid var(--accent); }
.type-events { background: var(--forward-dim); color: #38bdf8; border: 1px solid #0e7490; }
.type-error { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
.type-navigate { background: #451a03; color: #fbbf24; border: 1px solid #92400e; }

.event-channel { font-size: 10px; color: var(--text-dim); }
.event-channel span { color: var(--text); }
.event-ts { font-size: 10px; color: var(--text-dim); margin-left: auto; flex-shrink: 0; }

.event-msg { font-size: 12px; color: var(--text-bright); line-height: 1.5; word-break: break-word; }

.forward-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  margin-top: 6px;
  font-size: 11px;
  color: #94a3b8;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}

.priority {
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 2px;
}
.priority-low { color: var(--text-dim); }
.priority-normal { color: var(--text-dim); }
.priority-high { color: var(--warn); background: #451a03; border: 1px solid #78350f; }
.priority-urgent { color: var(--urgent); background: #450a0a; border: 1px solid #991b1b; }

.btn-respond {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn-send { background: var(--ask); color: #fff; border-color: #3b82f6; }
.btn-send:hover { background: #3b82f6; }
.btn-approve { background: var(--auth-yes); color: #fff; border-color: #22c55e; }
.btn-approve:hover { background: #22c55e; }
.btn-deny { background: var(--auth-no); color: #fff; border-color: #ef4444; }
.btn-deny:hover { background: #ef4444; }

.response-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; margin-top: 6px;
  padding: 3px 8px; border-radius: var(--radius);
}
.response-badge.approved { background: #14532d; color: #86efac; }
.response-badge.denied { background: #450a0a; color: #fca5a5; }
.response-badge.answered { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
.response-badge.opened { background: #14532d; color: #86efac; border: 1px solid #166534; }

.right-panel {
  width: 240px;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--bg1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.panel-body { flex: 1; overflow-y: auto; padding: 10px 14px; }

.raw-toggle {
  font-size: 10px;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font);
  padding: 2px 0;
  margin-top: 4px;
}
.raw-toggle:hover { color: var(--accent-bright); }
.raw-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  font-size: 10px;
  color: #64748b;
  max-height: 160px;
  overflow: auto;
  margin-top: 4px;
  white-space: pre;
  line-height: 1.5;
}

.statusbar {
  height: 24px;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  background: var(--accent-dim);
  border-top: 1px solid var(--accent);
  font-size: 10px;
  color: #a78bfa;
  flex-shrink: 0;
}
.statusbar-item { display: flex; align-items: center; gap: 4px; }
.statusbar-sep { width: 1px; height: 12px; background: var(--accent); opacity: 0.4; }

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease-out;
}
.modal {
  background: var(--bg1);
  border: 1px solid var(--border2);
  border-radius: 4px;
  width: 540px;
  max-width: 90vw;
  max-height: 80vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,0.8), 0 0 0 1px var(--border);
  animation: modalIn 0.18s ease-out;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
.modal-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-bright); }
.modal-close {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 2px 6px; font-family: var(--font);
  border-radius: var(--radius);
}
.modal-close:hover { color: var(--text); background: var(--bg3); }
.modal-body { flex: 1; overflow-y: auto; padding: 18px; }
.modal-section { margin-bottom: 14px; }
.modal-section:last-child { margin-bottom: 0; }
.modal-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px;
}
.modal-message {
  font-size: 14px; color: var(--text-bright); line-height: 1.6;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
}
.modal-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-meta-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 10px;
}
.modal-meta-key { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
.modal-meta-val { font-size: 12px; color: var(--text-bright); }
.modal-footer { padding: 14px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
.modal-respond-row { display: flex; gap: 8px; align-items: flex-start; }
.modal-respond-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
  min-height: 38px;
}
.modal-respond-input:focus { border-color: var(--accent); }
.modal-respond-input::placeholder { color: var(--text-dim); }

/* Decision layout */
.modal.modal-decision { width: 680px; }
.decision-context {
  overflow-y: auto;
  max-height: 220px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
}
.decision-options-list {
  overflow-y: auto;
  max-height: 360px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.decision-option-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  cursor: default;
}
.decision-option-card.recommended {
  background: var(--ask-dim);
  border-color: var(--ask);
}
.decision-option-card.selected {
  border-color: var(--ask);
  box-shadow: 0 0 0 1px var(--ask);
}
.detail-toggle {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  padding: 2px 0;
  margin-top: 4px;
}
.detail-toggle:hover { color: var(--text); }
.rec-badge {
  font-size: 10px;
  background: var(--ask);
  color: #fff;
  border-radius: 4px;
  padding: 1px 6px;
}
.md-body { line-height: 1.6; }
.md-body p { margin-bottom: 8px; }
.md-body p:last-child { margin-bottom: 0; }
.md-body strong { color: var(--text-bright); }
.md-body code {
  background: var(--bg3);
  border-radius: 2px;
  padding: 1px 4px;
  font-size: 11px;
}
.md-body ul { padding-left: 18px; margin-bottom: 8px; }
.md-body a { color: var(--accent-bright); text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.btn-use-rec {
  background: var(--ask);
  color: #fff;
  border-color: var(--ask);
  padding: 8px 18px;
}
.btn-use-rec:hover { background: #1d4ed8; }

.task-list { display: flex; flex-direction: column; gap: 0; }
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: var(--bg2); }
.task-item.task-pending:hover { background: var(--bg3); }
.task-status-icon {
  width: 18px; height: 18px; border-radius: 50%;
  flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
}
.task-status-icon.pending { background: var(--bg3); border: 1.5px solid var(--border2); color: var(--text-dim); }
.task-status-icon.approved { background: #14532d; border: 1.5px solid var(--auth-yes); color: #4ade80; }
.task-status-icon.denied { background: #450a0a; border: 1.5px solid var(--auth-no); color: #fca5a5; }
.task-status-icon.answered { background: var(--ask-dim); border: 1.5px solid var(--ask); color: #93c5fd; }
.task-status-icon.opened { background: #14532d; border: 1.5px solid var(--auth-yes); color: #4ade80; }
.task-content { flex: 1; min-width: 0; }
.task-type-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.task-msg { font-size: 11px; color: var(--text); line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.task-meta { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
.task-pending-pulse {
  width: 6px; height: 6px; border-radius: 50%; background: var(--urgent);
  animation: pulse 1.5s infinite; flex-shrink: 0; margin-top: 6px;
}
.task-list-empty { font-size: 11px; color: var(--text-dim); text-align: center; padding: 24px 0; opacity: 0.5; line-height: 1.8; }

.scroll-notice {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 4px 14px;
  font-size: 11px;
  color: var(--accent-bright);
  cursor: pointer;
  z-index: 10;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// Auto-detect WS URL: same-origin as the page (server unified on one port)
const wsDefault = (() => {
  try {
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${proto}//${window.location.host}`;
  } catch(_) { return 'ws://127.0.0.1:8080'; }
})();

// ── Preference storage ────────────────────────────────────────────────────
const PREFS_KEY = 'ailoop-ui:prefs';
const PREFS_VERSION = 1;

function defaultPrefs() {
  return {
    version: PREFS_VERSION,
    autoOpenDecisionModal: true,
    onlyPending: true,
    activeChannel: 'all',
    activeTypes: [],
    beepOnAlert: false,
    flashTabOnAlert: false,
  };
}

function loadPrefs() {
  try {
    const raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return defaultPrefs();
    const parsed = JSON.parse(raw);
    if (parsed.version !== PREFS_VERSION) return defaultPrefs();
    return { ...defaultPrefs(), ...parsed };
  } catch (_) {
    return defaultPrefs();
  }
}

function savePrefs(prefs) {
  try {
    localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
  } catch (e) {
    console.warn('ailoop: could not save prefs', e);
  }
}

function playBeep(audioCtxRef) {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    let ctx = audioCtxRef.current;
    if (!ctx) { ctx = new Ctx(); audioCtxRef.current = ctx; }
    if (ctx.state === 'suspended') ctx.resume();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.15, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.13);
  } catch (e) {
    console.warn('ailoop: beep error', e);
  }
}

function setFaviconBadge(on) {
  try {
    const link = document.getElementById('favicon');
    if (!link) return;
    if (!on) { link.href = 'data:,'; return; }
    const c = document.createElement('canvas');
    c.width = c.height = 32;
    const g = c.getContext('2d');
    g.fillStyle = '#0a0a0f'; g.fillRect(0, 0, 32, 32);
    g.fillStyle = '#ef4444';
    g.beginPath(); g.arc(16, 16, 9, 0, Math.PI * 2); g.fill();
    link.href = c.toDataURL('image/png');
  } catch (_) {}
}

function formatTs(iso) {
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 5) return 'just now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
}

function formatTsAbsolute(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

let eventIdCounter = 0;
function makeId() { return ++eventIdCounter; }


function getStripe(type) {
  if (type === 'authorize') return 'stripe-authorize';
  if (type === 'ask' || type === 'decision') return 'stripe-ask';
  if (type === 'say') return 'stripe-say';
  if (type === 'events') return 'stripe-events';
  if (type === 'navigate') return 'stripe-navigate';
  return 'stripe-unknown';
}
function getTypeClass(type) {
  if (type === 'authorize') return 'type-authorize';
  if (type === 'ask' || type === 'decision') return 'type-ask';
  if (type === 'say') return 'type-say';
  if (type === 'events') return 'type-events';
  if (type === 'navigate') return 'type-navigate';
  return 'type-error';
}

function renderMessage(text) {
  if (!text) return null;
  const parts = text.split(/(https?:\/\/[^\s<>"']+)/g);
  return parts.map((part, i) =>
    /^https?:\/\//.test(part)
      ? <a key={i} href={part} target="_blank" rel="noopener noreferrer"
           style={{color:'var(--accent-bright)', textDecoration:'underline'}}>{part}</a>
      : part
  );
}

function RawBlock({ data }) {
  const [open, setOpen] = useState(false);
  return (
    <div>
      <button className="raw-toggle" onClick={(e) => { e.stopPropagation(); setOpen(o => !o); }}>
        {open ? '▾ hide json' : '▸ raw json'}
      </button>
      {open && <pre className="raw-block">{JSON.stringify(data, null, 2)}</pre>}
    </div>
  );
}

function NotificationPrompt({ onDismiss }) {
  function handleEnable() {
    if (typeof Notification !== 'undefined') {
      Notification.requestPermission();
    }
    onDismiss();
  }
  return (
    <div className="notif-banner">
      <span className="notif-banner-text">Enable desktop notifications for pending asks?</span>
      <button className="btn btn-connect" style={{padding:'3px 10px', fontSize:11}} onClick={handleEnable}>Enable</button>
      <button className="btn btn-disconnect" style={{padding:'3px 10px', fontSize:11}} onClick={onDismiss}>Dismiss</button>
    </div>
  );
}

function renderMarkdown(text) {
  try {
    if (!text) return React.createElement('div', {className:'md-body'});
    const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    function parseInline(raw) {
      const parts = [];
      let i = 0;
      while (i < raw.length) {
        if (raw[i] === '<') {
          const end = raw.indexOf('>', i);
          if (end !== -1) { parts.push(escapeHtml(raw.slice(i, end+1))); i = end+1; continue; }
        }
        const boldD = raw.indexOf('**', i);
        const boldU = raw.indexOf('__', i);
        const italicS = raw.indexOf('*', i);
        const italicU = raw.indexOf('_', i);
        const codeT = raw.indexOf('`', i);
        const httpT = raw.indexOf('https://', i);
        const imgT = raw.indexOf('![', i);

        const candidates = [
          boldD !== -1 ? boldD : Infinity,
          boldU !== -1 ? boldU : Infinity,
          codeT !== -1 ? codeT : Infinity,
          httpT !== -1 ? httpT : Infinity,
          imgT !== -1 ? imgT : Infinity,
          italicS !== -1 ? italicS : Infinity,
          italicU !== -1 ? italicU : Infinity,
        ];
        const next = Math.min(...candidates);

        if (next === Infinity || next > raw.length) {
          parts.push(raw.slice(i)); break;
        }

        if (next > i) { parts.push(raw.slice(i, next)); i = next; continue; }

        if (imgT === i) {
          const altEnd = raw.indexOf(']', i+2);
          if (altEnd !== -1 && raw[altEnd+1] === '(') {
            const urlEnd = raw.indexOf(')', altEnd+2);
            if (urlEnd !== -1) { i = urlEnd+1; continue; }
          }
          parts.push('!['); i += 2; continue;
        }

        if (raw.startsWith('**', i) && boldD === i) {
          const close = raw.indexOf('**', i+2);
          if (close !== -1) {
            parts.push(React.createElement('strong', {key:i}, parseInline(raw.slice(i+2, close))));
            i = close+2; continue;
          }
        }
        if (raw.startsWith('__', i) && boldU === i) {
          const close = raw.indexOf('__', i+2);
          if (close !== -1) {
            parts.push(React.createElement('strong', {key:i}, parseInline(raw.slice(i+2, close))));
            i = close+2; continue;
          }
        }
        if (raw[i] === '`' && codeT === i) {
          const close = raw.indexOf('`', i+1);
          if (close !== -1) {
            parts.push(React.createElement('code', {key:i}, raw.slice(i+1, close)));
            i = close+1; continue;
          }
        }
        if (raw.startsWith('https://', i) && httpT === i) {
          const m = raw.slice(i).match(/^https:\/\/[^\s)>\]"']*/);
          if (m) {
            const url = m[0];
            parts.push(React.createElement('a', {key:i, href:url, rel:'noopener noreferrer', target:'_blank'}, url));
            i += url.length; continue;
          }
        }
        if (raw[i] === '*' && raw[i+1] !== '*' && italicS === i) {
          const close = raw.indexOf('*', i+1);
          if (close !== -1 && raw[close-1] !== '*') {
            parts.push(React.createElement('em', {key:i}, parseInline(raw.slice(i+1, close))));
            i = close+1; continue;
          }
        }
        if (raw[i] === '_' && raw[i+1] !== '_' && italicU === i) {
          const close = raw.indexOf('_', i+1);
          if (close !== -1 && raw[close-1] !== '_') {
            parts.push(React.createElement('em', {key:i}, parseInline(raw.slice(i+1, close))));
            i = close+1; continue;
          }
        }
        parts.push(raw[i]); i++;
      }
      return parts;
    }

    const paragraphs = text.split(/\n\n+/);
    const nodes = paragraphs.map((para, pi) => {
      const lines = para.split('\n');
      const listItems = lines.filter(l => /^[-*] /.test(l));
      if (listItems.length === lines.length && listItems.length > 0) {
        return React.createElement('ul', {key:pi},
          lines.map((l, li) => React.createElement('li', {key:li}, parseInline(l.replace(/^[-*] /, ''))))
        );
      }
      const headingMatch = para.match(/^#+\s+(.*)/);
      if (headingMatch) {
        return React.createElement('p', {key:pi}, React.createElement('strong', null, parseInline(headingMatch[1])));
      }
      return React.createElement('p', {key:pi}, parseInline(para));
    });
    return React.createElement('div', {className:'md-body'}, nodes);
  } catch(e) {
    return React.createElement('pre', {style:{whiteSpace:'pre-wrap'}}, text);
  }
}

function EventModal({ ev, onClose, onRespond }) {
  const [answer, setAnswer] = useState('');
  const [selectedChoice, setSelectedChoice] = useState(null);
  const [selectedOptionId, setSelectedOptionId] = useState(null);

  const initialOpenStates = React.useMemo(() => {
    if (!ev.decisionOptions) return {};
    return Object.fromEntries(
      ev.decisionOptions.map(opt => [
        opt.id,
        ev.decisionOptions.length <= 3 && (opt.detail_markdown?.length ?? 0) <= 200
      ])
    );
  }, [ev.id]);
  const [openDetails, setOpenDetails] = useState(initialOpenStates);

  function toggleDetail(optId) {
    setOpenDetails(prev => ({ ...prev, [optId]: !prev[optId] }));
  }

  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onClose(); }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  useEffect(() => { setAnswer(''); setSelectedChoice(null); setSelectedOptionId(null); setOpenDetails(initialOpenStates); }, [ev.id]);

  function handleAskSend() {
    const value = ev.choices?.length ? selectedChoice : answer.trim();
    if (!value) return;
    onRespond(ev, { type: 'answered', value });
    onClose();
  }

  function handleDecisionSelect(optionId) {
    onRespond(ev, { type: 'answered', optionId, value: optionId });
    onClose();
  }

  function handleAuth(approved) {
    onRespond(ev, { type: approved ? 'approved' : 'denied' });
    onClose();
  }

  function handleNavigateOpen() {
    window.open(ev.url, '_blank', 'noopener,noreferrer');
    onRespond(ev, { type: 'opened' });
    onClose();
  }

  function handleNavigateDeny() {
    onRespond(ev, { type: 'denied' });
    onClose();
  }

  return (
    <div className="modal-backdrop" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className={`modal${ev.type === 'decision' ? ' modal-decision' : ''}`}>
        <div className="modal-header">
          <span className={`event-type ${getTypeClass(ev.type)}`}>{ev.type}</span>
          <span className="modal-title">{ev.channel && `#${ev.channel}`}</span>
          {ev.responded && (
            <span className={`response-badge ${ev.responded.type}`} style={{margin:0}}>
              {ev.responded.type === 'approved' && '✓ approved'}
              {ev.responded.type === 'denied' && '✗ denied'}
              {ev.responded.type === 'answered' && '✓ answered'}
              {ev.responded.type === 'opened' && '↗ opened'}
            </span>
          )}
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          {ev.type === 'navigate' && (
            <div className="modal-section">
              <div className="modal-label">URL to open</div>
              <code style={{display:'block', background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'var(--radius)', padding:'12px 14px', fontSize:13, color:'var(--text-bright)', wordBreak:'break-all', userSelect:'text'}}>{ev.url}</code>
            </div>
          )}

          {ev.message && ev.type !== 'navigate' && (
            <div className="modal-section">
              <div className="modal-label">
                {ev.type === 'authorize' ? 'Action requiring approval' : ev.type === 'decision' ? 'Decision' : ev.type === 'ask' ? 'Question' : 'Message'}
              </div>
              <div className="modal-message">{renderMessage(ev.message)}</div>
            </div>
          )}

          {ev.type === 'decision' && ev.decisionContextMarkdown && (
            <div className="modal-section">
              <div className="modal-label">Context</div>
              <div className="decision-context">
                {renderMarkdown(ev.decisionContextMarkdown)}
              </div>
            </div>
          )}

          {ev.type === 'decision' && ev.decisionOptions?.length > 0 && (
            <div className="modal-section">
              <div className="modal-label">Options</div>
              <div className="decision-options-list" role="list">
                {ev.decisionOptions.map((opt, i) => {
                  const isRec = ev.decisionRecommendation?.option_id === opt.id;
                  const isSelected = selectedOptionId === opt.id;
                  const isOpen = openDetails[opt.id] ?? false;
                  const detailPanelId = `detail-${ev.id}-${opt.id}`;
                  return (
                    <div
                      key={opt.id}
                      role="listitem"
                      className={['decision-option-card', isRec ? 'recommended' : '', isSelected ? 'selected' : ''].join(' ')}
                    >
                      <div style={{display:'flex', alignItems:'center', gap:6}}>
                        <span style={{fontSize:11, color:'var(--text-dim)'}}>{i+1}.</span>
                        <span style={{fontSize:13, color:'var(--text-bright)', fontWeight:600, flex:1}}>{opt.label}</span>
                        {isRec && <span className="rec-badge">recommended</span>}
                        {isSelected && <span style={{fontSize:11, color:'var(--ask)'}}>✓</span>}
                        <button
                          className="btn btn-send"
                          style={{padding:'4px 12px', fontSize:11, minHeight:44, minWidth:44}}
                          onClick={() => setSelectedOptionId(opt.id)}
                        >
                          {isSelected ? 'Selected' : 'Select'}
                        </button>
                      </div>
                      {opt.detail_markdown && (
                        <>
                          <button
                            className="detail-toggle"
                            aria-expanded={isOpen}
                            aria-controls={detailPanelId}
                            onClick={() => toggleDetail(opt.id)}
                          >
                            {isOpen ? 'Details ▾' : 'Details ▸'}
                          </button>
                          {isOpen && (
                            <div
                              id={detailPanelId}
                              role="region"
                              className="md-body"
                              style={{marginTop:6, paddingLeft:16, fontSize:11}}
                            >
                              {renderMarkdown(opt.detail_markdown)}
                            </div>
                          )}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {ev.type === 'decision' && !ev.decisionOptions?.length && (
            <div className="modal-section">
              <div style={{fontSize:12, color:'var(--text-dim)'}}>No options available.</div>
            </div>
          )}

          {ev.content && (
            <div className="modal-section">
              <div className="modal-label">Output</div>
              <pre className="forward-content" style={{maxHeight:200}}>{ev.content}</pre>
            </div>
          )}

          {/* Numeric optional fields MUST use `> 0` guard, not truthiness, to prevent rendering `0`. */}
          <div className="modal-section">
            <div className="modal-meta-grid">
              <div className="modal-meta-item">
                <div className="modal-meta-key">channel</div>
                <div className="modal-meta-val">{ev.channel || '—'}</div>
              </div>
              <div className="modal-meta-item">
                <div className="modal-meta-key">received</div>
                <div className="modal-meta-val">{formatTsAbsolute(ev.ts)}</div>
              </div>
              {(ev.timeout ?? 0) > 0 && (
                <div className="modal-meta-item">
                  <div className="modal-meta-key">timeout</div>
                  <div className="modal-meta-val">{ev.timeout}s</div>
                </div>
              )}
              {ev.priority && ev.priority !== 'normal' && (
                <div className="modal-meta-item">
                  <div className="modal-meta-key">priority</div>
                  <div className="modal-meta-val">
                    <span className={`priority priority-${ev.priority}`}>{ev.priority}</span>
                  </div>
                </div>
              )}
              {ev.senderType && (
                <div className="modal-meta-item">
                  <div className="modal-meta-key">sender</div>
                  <div className="modal-meta-val">{ev.senderType}</div>
                </div>
              )}
              {ev.agent_type && (
                <div className="modal-meta-item">
                  <div className="modal-meta-key">agent</div>
                  <div className="modal-meta-val">{ev.agent_type}</div>
                </div>
              )}
            </div>
          </div>

          <RawBlock data={ev.raw || ev} />
        </div>

        {!ev.responded && (ev.type === 'decision' || ev.type === 'ask' || ev.type === 'authorize' || ev.type === 'navigate') && (
          <div className="modal-footer">
            {ev.type === 'decision' && (
              <div style={{display:'flex', flexDirection:'column', gap:8}}>
                {ev.decisionRecommendation && (() => {
                  const recOpt = ev.decisionOptions?.find(o => o.id === ev.decisionRecommendation.option_id);
                  return recOpt ? (
                    <button
                      className="btn btn-use-rec"
                      onClick={() => handleDecisionSelect(recOpt.id)}
                    >
                      ✓ Use recommendation: {recOpt.label}
                    </button>
                  ) : null;
                })()}
                {selectedOptionId ? (
                  <button
                    className="btn btn-respond btn-approve"
                    style={{padding:'8px 18px'}}
                    onClick={() => handleDecisionSelect(selectedOptionId)}
                  >
                    Submit
                  </button>
                ) : (
                  <span style={{fontSize:11, color:'var(--text-dim)'}}>Select an option above to confirm.</span>
                )}
              </div>
            )}
            {ev.type === 'navigate' && (
              <div className="modal-respond-row" style={{gap:10}}>
                <div style={{flex:1, fontSize:11, color:'var(--text-dim)', lineHeight:1.5}}>
                  Agent is requesting to open this URL in your browser.
                </div>
                <button className="btn btn-respond btn-approve" style={{padding:'8px 20px'}} onClick={handleNavigateOpen}>Open link</button>
                <button className="btn btn-respond btn-deny" style={{padding:'8px 20px'}} onClick={handleNavigateDeny}>Deny</button>
              </div>
            )}
            {ev.type === 'ask' && ev.choices?.length ? (
              <div className="modal-respond-row" style={{flexDirection:'column', alignItems:'flex-start', gap:8}}>
                <div style={{display:'flex', flexDirection:'column', gap:8}}>
                  {ev.choices.map(choice => (
                    <label key={choice} style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer'}}>
                      <input
                        type="radio"
                        name={`choice-${ev.id}`}
                        value={choice}
                        checked={selectedChoice === choice}
                        onChange={() => setSelectedChoice(choice)}
                      />
                      {choice}
                    </label>
                  ))}
                </div>
                <button
                  className="btn btn-respond btn-send"
                  onClick={handleAskSend}
                  disabled={selectedChoice === null}
                  style={{padding:'8px 18px'}}
                >Send ↵</button>
              </div>
            ) : ev.type === 'ask' ? (
              <div className="modal-respond-row">
                <textarea
                  className="modal-respond-input"
                  placeholder="Type your answer… (Enter to send)"
                  value={answer}
                  autoFocus
                  onChange={e => setAnswer(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAskSend(); } }}
                />
                <button className="btn btn-respond btn-send" onClick={handleAskSend} style={{padding:'8px 18px'}}>Send ↵</button>
              </div>
            ) : null}
            {ev.type === 'authorize' && (
              <div className="modal-respond-row" style={{gap:10}}>
                <div style={{flex:1, fontSize:11, color:'var(--text-dim)', lineHeight:1.5}}>
                  This action requires your explicit approval to proceed.
                </div>
                <button className="btn btn-respond btn-approve" style={{padding:'8px 20px'}} onClick={() => handleAuth(true)}>✓ Approve</button>
                <button className="btn btn-respond btn-deny" style={{padding:'8px 20px'}} onClick={() => handleAuth(false)}>✗ Deny</button>
              </div>
            )}
          </div>
        )}

        {ev.responded && ev.responded.type === 'answered' && (
          <div className="modal-footer">
            <div style={{fontSize:12, color:'var(--text-dim)'}}>
              Response sent: <span style={{color:'var(--text-bright)'}}>{ev.responded.value}</span>
            </div>
          </div>
        )}
        {ev.responded && ev.responded.type === 'opened' && (
          <div className="modal-footer">
            <div style={{fontSize:12, color:'var(--text-dim)'}}>
              URL opened: <span style={{color:'var(--text-bright)'}}>{ev.url}</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function EventCard({ ev, onOpenModal }) {
  const interactive = ev.type === 'decision' || ev.type === 'ask' || ev.type === 'authorize' || ev.type === 'navigate';
  const needsAction = interactive && !ev.responded;
  return (
    <div
      className="event-card"
      onClick={() => interactive && onOpenModal(ev)}
      style={{ cursor: interactive ? 'pointer' : 'default' }}
    >
      <div className={`event-stripe ${getStripe(ev.type)}`}></div>
      <div className="event-body">
        <div className="event-meta">
          <span className={`event-type ${getTypeClass(ev.type)}`}>{ev.type}</span>
          {ev.channel && <span className="event-channel">ch:<span>{ev.channel}</span></span>}
          {ev.priority && ev.priority !== 'normal' && (
            <span className={`priority priority-${ev.priority}`}>{ev.priority}</span>
          )}
          {(ev.timeout ?? 0) > 0 && <span className="event-channel">timeout:<span>{ev.timeout}s</span></span>}
          {ev.agent_type && <span className="event-channel">agent:<span>{ev.agent_type}</span></span>}
          <span className="event-ts">{formatTs(ev.ts)}</span>
        </div>

        {ev.message && <div className="event-msg">{renderMessage(ev.message)}</div>}
        {ev.content && <pre className="forward-content">{ev.content}</pre>}

        {ev.type === 'ask' && ev.responded && ev.responded.type === 'answered' && (
          <div className="response-badge answered">✓ answered</div>
        )}
        {ev.type === 'authorize' && ev.responded && ev.responded.type === 'approved' && (
          <div className="response-badge approved">✓ approved</div>
        )}
        {ev.type === 'authorize' && ev.responded && ev.responded.type === 'denied' && (
          <div className="response-badge denied">✗ denied</div>
        )}
        {ev.type === 'navigate' && ev.responded && ev.responded.type === 'opened' && (
          <div className="response-badge opened">↗ opened</div>
        )}
        {ev.type === 'navigate' && ev.responded && ev.responded.type === 'denied' && (
          <div className="response-badge denied">✗ denied</div>
        )}

        {needsAction && (
          <div style={{fontSize:10, color:'var(--accent-bright)', marginTop:5, opacity:0.7}}>
            ↗ click to respond
          </div>
        )}

        <RawBlock data={ev.raw || ev} />
      </div>
    </div>
  );
}

function getTaskStatus(ev) {
  if (!ev.responded) return 'pending';
  if (ev.responded.type === 'approved') return 'approved';
  if (ev.responded.type === 'denied') return 'denied';
  if (ev.responded.type === 'opened') return 'opened';
  return 'answered';
}

function TaskItem({ ev, onOpenModal }) {
  const status = getTaskStatus(ev);
  const statusIcons = { pending: '○', approved: '✓', denied: '✗', answered: '✓', opened: '↗' };
  return (
    <div className={`task-item task-${status}`} onClick={() => onOpenModal(ev)}>
      <div className={`task-status-icon ${status}`}>{statusIcons[status]}</div>
      <div className="task-content">
        <div className="task-type-row">
          <span className={`event-type ${getTypeClass(ev.type)}`} style={{fontSize:'9px'}}>{ev.type}</span>
          {status === 'pending' && <span style={{fontSize:10, color:'var(--urgent)', fontWeight:600}}>pending</span>}
        </div>
        <div className="task-msg">{renderMessage(ev.message)}</div>
        <div className="task-meta">#{ev.channel} · {formatTs(ev.ts)}</div>
      </div>
      {status === 'pending' && <div className="task-pending-pulse"></div>}
    </div>
  );
}

function TaskList({ events, onOpenModal }) {
  const tasks = events.filter(e => e.type === 'ask' || e.type === 'authorize' || e.type === 'navigate');
  const pending = tasks.filter(t => !t.responded);
  const done = tasks.filter(t => t.responded);

  if (tasks.length === 0) {
    return (
      <div className="task-list-empty">
        No tasks yet.<br />
        ask, authorize and navigate<br />events appear here.
      </div>
    );
  }

  return (
    <div className="task-list">
      {pending.length > 0 && (
        <>
          <div style={{padding:'8px 14px 4px', fontSize:10, fontWeight:700, letterSpacing:'0.08em', color:'var(--urgent)', textTransform:'uppercase'}}>
            Needs response ({pending.length})
          </div>
          {pending.map(ev => <TaskItem key={ev.id} ev={ev} onOpenModal={onOpenModal} />)}
        </>
      )}
      {done.length > 0 && (
        <>
          <div style={{padding:'10px 14px 4px', fontSize:10, fontWeight:700, letterSpacing:'0.08em', color:'var(--text-dim)', textTransform:'uppercase', borderTop: pending.length > 0 ? '1px solid var(--border)' : 'none'}}>
            Resolved ({done.length})
          </div>
          {done.map(ev => <TaskItem key={ev.id} ev={ev} onOpenModal={onOpenModal} />)}
        </>
      )}
    </div>
  );
}

function StatsPanel({ events }) {
  const counts = { ask: 0, authorize: 0, say: 0, events: 0 };
  events.forEach(e => { if (counts[e.type] !== undefined) counts[e.type]++; });
  const pending = events.filter(e => (e.type === 'ask' || e.type === 'authorize') && !e.responded).length;
  return (
    <div className="stats-grid">
      <div className="stat-row"><span className="stat-label">ask</span><span className="stat-val ask">{counts.ask}</span></div>
      <div className="stat-row"><span className="stat-label">authorize</span><span className="stat-val auth">{counts.authorize}</span></div>
      <div className="stat-row"><span className="stat-label">say</span><span className="stat-val say">{counts.say}</span></div>
      <div className="stat-row"><span className="stat-label">events</span><span className="stat-val forward">{counts.events}</span></div>
      <div className="stat-row" style={{borderTop:'1px solid var(--border)',paddingTop:6,marginTop:2}}>
        <span className="stat-label">pending</span>
        <span className="stat-val" style={{color: pending > 0 ? 'var(--urgent)' : 'var(--text-dim)'}}>{pending}</span>
      </div>
      <div className="stat-row">
        <span className="stat-label">total</span>
        <span className="stat-val" style={{color:'var(--text)'}}>{events.length}</span>
      </div>
    </div>
  );
}

function App() {
  const [serverUrl, setServerUrl] = useState(() => loadPrefs().serverUrl || wsDefault);
  const [connState, setConnState] = useState('disconnected');
  const [events, setEvents] = useState([]);
  const [activeChannel, setActiveChannel] = useState(() => loadPrefs().activeChannel);
  const [activeTypes, setActiveTypes] = useState(() => new Set(loadPrefs().activeTypes));
  const [onlyPending, setOnlyPending] = useState(() => loadPrefs().onlyPending);
  const [autoOpenDecisionModal, setAutoOpenDecisionModal] = useState(() => loadPrefs().autoOpenDecisionModal);
  const [beepOnAlert, setBeepOnAlert] = useState(() => loadPrefs().beepOnAlert);
  const [flashTabOnAlert, setFlashTabOnAlert] = useState(() => loadPrefs().flashTabOnAlert);
  const [atTop, setAtTop] = useState(true);
  const [modalEv, setModalEv] = useState(null);
  const [, forceTick] = useState(0);
  const [notifPromptDismissed, setNotifPromptDismissed] = useState(false);
  const [showNotifPrompt, setShowNotifPrompt] = useState(false);

  const wsRef = useRef(null);
  const feedRef = useRef(null);
  const seenServerIds = useRef(new Set());

  // Refs for auto-open modal policy (avoid stale closures in async handlers)
  const isReviewingRef = useRef(false);
  const autoOpenRef = useRef(loadPrefs().autoOpenDecisionModal);
  const eventsRef = useRef([]);
  const modalEvIdRef = useRef(null);
  const beepOnAlertRef = useRef(loadPrefs().beepOnAlert);
  const flashTabOnAlertRef = useRef(loadPrefs().flashTabOnAlert);
  const audioCtxRef = useRef(null);
  const flashTimerRef = useRef(null);
  const pendingCountRef = useRef(0);

  // Tick once a minute so relative timestamps stay fresh.
  useEffect(() => {
    const id = setInterval(() => forceTick(t => t + 1), 30000);
    return () => clearInterval(id);
  }, []);

  // Debounced prefs save
  useEffect(() => {
    const timer = setTimeout(() => {
      savePrefs({
        version: PREFS_VERSION,
        autoOpenDecisionModal,
        onlyPending,
        activeChannel,
        activeTypes: [...activeTypes],
        serverUrl,
        beepOnAlert,
        flashTabOnAlert,
      });
    }, 150);
    return () => clearTimeout(timer);
  }, [serverUrl, activeChannel, activeTypes, onlyPending, autoOpenDecisionModal, beepOnAlert, flashTabOnAlert]);

  // Sync refs with state
  useEffect(() => {
    isReviewingRef.current = modalEv !== null;
    modalEvIdRef.current = modalEv ? modalEv.id : null;
  }, [modalEv]);

  useEffect(() => {
    autoOpenRef.current = autoOpenDecisionModal;
  }, [autoOpenDecisionModal]);

  useEffect(() => {
    eventsRef.current = events;
  }, [events]);

  useEffect(() => { beepOnAlertRef.current     = beepOnAlert;     }, [beepOnAlert]);
  useEffect(() => { flashTabOnAlertRef.current = flashTabOnAlert; }, [flashTabOnAlert]);

  // Tab title badge
  const pendingCount = events.filter(e => (e.type === 'ask' || e.type === 'authorize' || e.type === 'navigate') && !e.responded).length;

  useEffect(() => { pendingCountRef.current = pendingCount; }, [pendingCount]);

  useEffect(() => {
    if (flashTimerRef.current) return;
    document.title = pendingCount > 0 ? `(${pendingCount}) ailoop` : 'ailoop';
  }, [pendingCount]);

  const scrollToLatest = useCallback(() => {
    if (feedRef.current) feedRef.current.scrollTop = 0;
  }, []);

  const stopTabFlash = useCallback(() => {
    if (flashTimerRef.current) { clearInterval(flashTimerRef.current); flashTimerRef.current = null; }
    setFaviconBadge(false);
    document.title = pendingCountRef.current > 0 ? `(${pendingCountRef.current}) ailoop` : 'ailoop';
  }, []);

  function startTabFlash() {
    if (flashTimerRef.current) return;
    setFaviconBadge(true);
    let on = false;
    flashTimerRef.current = setInterval(() => {
      on = !on;
      document.title = on ? '🔔 ailoop — alert!' : 'ailoop';
    }, 900);
  }

  useEffect(() => {
    const handler = () => { if (document.visibilityState === 'visible') stopTabFlash(); };
    document.addEventListener('visibilitychange', handler);
    return () => document.removeEventListener('visibilitychange', handler);
  }, [stopTabFlash]);

  function handleScroll() {
    if (!feedRef.current) return;
    setAtTop(feedRef.current.scrollTop < 40);
  }

  // ── Ingestion ──────────────────────────────────────────────────────────

  function normalizeRawToEvent(raw, seenServerIdsRef) {
    const sc = raw.content && typeof raw.content === 'object' ? raw.content : {};
    const serverType = sc.type || '';

    let type     = raw.type || raw.event_type || '';
    let message  = raw.message || raw.msg || raw.prompt || raw.text || raw.question || '';
    let content  = raw.output || '';
    let timeout  = raw.timeout;
    let priority = raw.priority || 'normal';
    let agentType = raw.agent_type;
    let choices;
    let url = '';
    let senderType = null;

    let decisionOptions = undefined;
    let decisionRecommendation = undefined;
    let decisionId = undefined;
    let decisionContextMarkdown = undefined;

    if (!type && serverType) {
      if (serverType === 'decision') {
        type = 'decision';
        message = sc.summary || '';
        timeout = sc.timeout_seconds;
        decisionOptions = Array.isArray(sc.options) ? sc.options : [];
        decisionRecommendation = sc.recommendation || null;
        decisionId = sc.decision_id || null;
        decisionContextMarkdown = sc.context_markdown || null;
      } else if (serverType === 'authorization') {
        type = 'authorize'; message = sc.action || ''; timeout = sc.timeout_seconds;
      } else if (serverType === 'notification') {
        type = 'say'; message = sc.text || ''; priority = sc.priority || 'normal';
      } else if (serverType === 'navigate') {
        type = 'navigate'; message = sc.url || ''; url = sc.url || ''; senderType = raw.sender_type || null; agentType = raw.metadata?.agent_name || null;
      } else {
        type = 'events'; content = JSON.stringify(sc);
      }
    }

    const serverId = raw.id || null;
    if (serverId && seenServerIdsRef.current.has(serverId)) return { skip: true };
    if (serverId) seenServerIdsRef.current.add(serverId);

    const ev = {
      id: makeId(),
      serverId,
      ts: raw.timestamp || raw.ts || new Date().toISOString(),
      type: type || 'unknown',
      channel: raw.channel || raw.ch || 'public',
      message,
      url,
      senderType,
      content,
      priority,
      timeout,
      choices,
      decisionOptions,
      decisionRecommendation,
      decisionId,
      decisionContextMarkdown,
      agent_type: agentType,
      responded: null,
      raw,
    };
    return { ev };
  }

  function appendEvent(ev) {
    setEvents(prev => [ev, ...prev]);
  }

  function ingestHistory(raw) {
    const result = normalizeRawToEvent(raw, seenServerIds);
    if (result.skip) return;
    appendEvent(result.ev);
  }

  function sendAttentionNotification(ev) {
    if (typeof Notification === 'undefined') return;
    if (document.visibilityState !== 'hidden') return;
    if (Notification.permission !== 'granted') return;
    try {
      new Notification('ailoop — pending', {
        body: ev.message,
        tag: ev.serverId || String(ev.id),
      });
    } catch (e) {
      console.warn('ailoop: notification error', e);
    }
  }

  // ── Auto-open modal policy ─────────────────────────────────────────────

  function maybeOpenModalFor(ev) {
    if (!autoOpenRef.current) return;
    if (ev.type !== 'decision' && ev.type !== 'ask' && ev.type !== 'authorize' && ev.type !== 'navigate') return;
    if (ev.responded !== null) return;
    if (isReviewingRef.current) return;
    setModalEv(ev);
  }

  function openNextPending() {
    const skipId = modalEvIdRef.current;
    const pending = eventsRef.current
      .filter(e => (e.type === 'decision' || e.type === 'ask' || e.type === 'authorize' || e.type === 'navigate') && e.responded === null && e.id !== skipId)
      .sort((a, b) => a.ts < b.ts ? -1 : a.ts > b.ts ? 1 : 0);
    if (pending.length > 0) {
      queueMicrotask(() => setModalEv(pending[0]));
    } else {
      setModalEv(null);
    }
  }

  function ingestLive(raw) {
    const result = normalizeRawToEvent(raw, seenServerIds);
    if (result.skip) return;
    appendEvent(result.ev);
    const ev = result.ev;
    if (ev.type === 'decision' || ev.type === 'ask' || ev.type === 'authorize' || ev.type === 'navigate') {
      maybeOpenModalFor(ev);
      sendAttentionNotification(ev);
      if (beepOnAlertRef.current) playBeep(audioCtxRef);
      if (flashTabOnAlertRef.current && document.visibilityState === 'hidden') startTabFlash();
    }
  }

  // ──────────────────────────────────────────────────────────────────────

  function handleRespond(ev, response) {
    // Optimistic local update
    setEvents(prev => prev.map(e => e.id === ev.id ? { ...e, responded: response } : e));
    // Submit to server via HTTP API when we have a real server message ID
    if (ev.serverId) {
      const responseType = response.type === 'approved' ? 'authorization_approved'
                         : response.type === 'opened'   ? 'authorization_approved'
                         : response.type === 'denied'   ? 'authorization_denied'
                         : 'text';
      // For decisions, answer must be the option id (not label)
      const answer = response.optionId || response.value || null;
      fetch(`/api/v1/messages/${ev.serverId}/response`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ response_type: responseType, answer }),
      }).catch(err => console.error('Response submit failed:', err));
    }
    openNextPending();
  }

  useEffect(() => {
    if (modalEv) {
      const updated = events.find(e => e.id === modalEv.id);
      if (updated && updated !== modalEv) setModalEv(updated);
    }
  }, [events]);

  function seedFromApi() {
    fetch('/api/channels')
      .then(r => r.json())
      .then(data => {
        const channels = (data.channels || []).map(c => c.name);
        channels.forEach(ch => {
          fetch(`/api/channels/${encodeURIComponent(ch)}/messages?limit=500`)
            .then(r => r.json())
            .then(d => (d.messages || []).forEach(ingestHistory))
            .catch(() => {});
        });
      })
      .catch(() => {});
  }

  function connect() {
    if (wsRef.current) wsRef.current.close();
    setConnState('connecting');
    try {
      const ws = new WebSocket(serverUrl);
      wsRef.current = ws;
      ws.onopen = () => {
        setConnState('connected');
        // Register as viewer so the server sends broadcasts (not enqueue as agent)
        ws.send(JSON.stringify({ subscribe: '*' }));
        // Seed existing history from HTTP API (deduped by seenServerIds)
        seedFromApi();
        // Show soft notification prompt if permission not yet decided
        if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
          setShowNotifPrompt(true);
        }
      };
      ws.onclose = () => setConnState('disconnected');
      ws.onerror = () => setConnState('error');
      ws.onmessage = (msg) => {
        try {
          const data = JSON.parse(msg.data);
          const evs = Array.isArray(data) ? data : [data];
          evs.forEach(raw => {
            const c = raw.content && typeof raw.content === 'object' ? raw.content : {};
            // Response messages update the responded state of their original event
            if (c.type === 'response' && raw.correlation_id) {
              const rt = c.response_type;
              setEvents(prev => prev.map(e => {
                if (e.serverId !== raw.correlation_id) return e;
                const responded =
                  rt === 'authorization_approved'
                    ? (e.type === 'navigate' ? { type: 'opened' } : { type: 'approved' })
                    : rt === 'authorization_denied' ? { type: 'denied' }
                    : { type: 'answered', value: c.answer || '' };
                return { ...e, responded };
              }));
              return;
            }
            ingestLive(raw);
          });
        } catch (e) {
          ingestLive({ type: 'events', channel: 'raw', content: msg.data, ts: new Date().toISOString() });
        }
      };
    } catch (e) {
      setConnState('error');
    }
  }

  function disconnect() {
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
    setConnState('disconnected');
  }

  const channels = useMemo(() => {
    const map = {};
    events.forEach(e => { map[e.channel] = (map[e.channel] || 0) + 1; });
    return map;
  }, [events]);

  const visibleEvents = useMemo(() => {
    return events.filter(e => {
      if (activeChannel !== 'all' && e.channel !== activeChannel) return false;
      if (activeTypes.size > 0 && !activeTypes.has(e.type)) return false;
      if (onlyPending && !(
        (e.type === 'ask' || e.type === 'authorize' || e.type === 'navigate') && !e.responded
      )) return false;
      return true;
    });
  }, [events, activeChannel, activeTypes, onlyPending]);

  const statusLabel = { disconnected: 'disconnected', connecting: 'connecting…', connected: 'connected', error: 'connection error' };

  return (
    <div id="app-root" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div className="topbar">
        <div className="topbar-logo">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.5"/>
            <path d="M5 8h6M8 5l3 3-3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          ailoop
        </div>
        <div className="topbar-sep"></div>
        <div className="conn-form">
          <input
            className="conn-input"
            value={serverUrl}
            onChange={e => setServerUrl(e.target.value)}
            placeholder="ws://127.0.0.1:8080"
            disabled={connState === 'connected'}
            onKeyDown={e => e.key === 'Enter' && connect()}
          />
          {(connState === 'disconnected' || connState === 'error') && (
            <button className="btn btn-connect" onClick={connect}>Connect</button>
          )}
          {(connState === 'connected' || connState === 'connecting') && (
            <button className="btn btn-disconnect" onClick={disconnect}>Disconnect</button>
          )}
        </div>
        <div className="topbar-sep"></div>
        <div className="status-indicator">
          <div className={`status-dot ${connState}`}></div>
          {statusLabel[connState]}
        </div>
      </div>

      {showNotifPrompt && !notifPromptDismissed && typeof Notification !== 'undefined' && Notification.permission === 'default' && (
        <NotificationPrompt onDismiss={() => { setNotifPromptDismissed(true); setShowNotifPrompt(false); }} />
      )}

      <div className="layout">
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-label">Channels</div>
            <div className={`channel-item ${activeChannel === 'all' ? 'active' : ''}`} onClick={() => setActiveChannel('all')}>
              <div className={`ch-dot ${activeChannel === 'all' ? 'active' : ''}`}></div>
              <span className="ch-name">all channels</span>
              <span className="ch-count">{events.length}</span>
            </div>
            {Object.entries(channels).map(([ch, cnt]) => (
              <div key={ch} className={`channel-item ${activeChannel === ch ? 'active' : ''}`} onClick={() => setActiveChannel(ch)}>
                <div className={`ch-dot ${activeChannel === ch ? 'active' : ''}`}></div>
                <span className="ch-name">{ch}</span>
                <span className="ch-count">{cnt}</span>
              </div>
            ))}
          </div>
          <div className="sidebar-section" style={{ flex: 1 }}>
            <div className="sidebar-label">Stats</div>
            <StatsPanel events={events} />
          </div>
        </div>

        <div className="feed-area" style={{ position: 'relative' }}>
          <div className="feed-toolbar">
            {['ask', 'authorize', 'say', 'events'].map(f => (
              <button
                key={f}
                className={`filter-btn ${activeTypes.has(f) ? `active-${f}` : ''}`}
                onClick={() => setActiveTypes(prev => {
                  const next = new Set(prev);
                  if (next.has(f)) next.delete(f); else next.add(f);
                  return next;
                })}
              >
                {f}
              </button>
            ))}
            <button
              className={`filter-btn ${onlyPending ? 'active-pending' : ''}`}
              onClick={() => setOnlyPending(p => !p)}
            >
              only pending
            </button>
            <button
              className={`filter-btn ${autoOpenDecisionModal ? 'active-autoopen' : ''}`}
              onClick={() => setAutoOpenDecisionModal(v => !v)}
            >
              auto-open
            </button>
            <button
              className={`filter-btn ${beepOnAlert ? 'active-beep' : ''}`}
              onClick={() => {
                if (!beepOnAlert) playBeep(audioCtxRef);
                setBeepOnAlert(v => !v);
              }}
            >beep</button>
            <button
              className={`filter-btn ${flashTabOnAlert ? 'active-flash' : ''}`}
              onClick={() => setFlashTabOnAlert(v => !v)}
            >flash tab</button>
            <div className="feed-toolbar-right">
              <button className="btn-clear" onClick={() => { setEvents([]); seenServerIds.current.clear(); }}>clear</button>
              <button className="scroll-btn" onClick={scrollToLatest}>↑ top</button>
            </div>
          </div>

          <div className="feed" ref={feedRef} onScroll={handleScroll}>
            {visibleEvents.length === 0 ? (
              <div className="feed-empty">
                <div className="feed-empty-icon">◉</div>
                <div className="feed-empty-text">
                  {connState === 'disconnected' || connState === 'error'
                    ? 'Connect to an ailoop server'
                    : 'Listening for events…\nailoop forward --channel public'}
                </div>
              </div>
            ) : (
              visibleEvents.map(ev => (
                <EventCard key={ev.id} ev={ev} onOpenModal={setModalEv} />
              ))
            )}
          </div>

          {!atTop && visibleEvents.length > 0 && (
            <div className="scroll-notice" onClick={scrollToLatest}>↑ back to latest</div>
          )}
        </div>

        <div className="right-panel">
          <div className="panel-header" style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
            <span>Tasks</span>
            {pendingCount > 0 && (
              <span style={{background:'var(--urgent)', color:'#fff', fontSize:10, fontWeight:700, padding:'1px 7px', borderRadius:10}}>
                {pendingCount}
              </span>
            )}
          </div>
          <div className="panel-body" style={{padding:0}}>
            <TaskList events={events} onOpenModal={setModalEv} />
          </div>
        </div>
      </div>

      <div className="statusbar">
        <div className="statusbar-item">ailoop</div>
        <div className="statusbar-sep"></div>
        <div className="statusbar-item">v0.1</div>
        <div className="statusbar-sep"></div>
        <div className="statusbar-item">{connState === 'connected' ? serverUrl : '—'}</div>
        <div className="statusbar-sep"></div>
        <div className="statusbar-item">{Object.keys(channels).length} ch · {events.length} events</div>
        <div className="statusbar-item" style={{ marginLeft: 'auto' }}>
          {new Date().toLocaleTimeString('en-US', { hour12: false })}
        </div>
      </div>

      {modalEv && (
        <EventModal
          ev={modalEv}
          onClose={openNextPending}
          onRespond={handleRespond}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
